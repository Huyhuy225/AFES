apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: afes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: huyhuy225/afes-backend:latest
        imagePullPolicy: Always  # Always pull from Docker Hub
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: afes-config
        - secretRef:
            name: afes-secret
        startupProbe:
          httpGet:
            path: /actuator/health   # Tạm dùng endpoint này cho đến khi rebuild image
            port: 8080
          initialDelaySeconds: 30   # liveness ready sớm hơn full health
          periodSeconds: 5
          failureThreshold: 36      # 30s + 5s*36 = max 210s
          timeoutSeconds: 5         # Tăng timeout vì node đang CPU pressure
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          periodSeconds: 30
          failureThreshold: 3
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          periodSeconds: 5
          failureThreshold: 3
          timeoutSeconds: 5
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"             # Request thấp để schedule được, limit cao để JVM burst
          limits:
            memory: "1Gi"
            cpu: "1000m"
      initContainers:
      - name: wait-for-db
        image: busybox:1.35
        command: ['sh', '-c', 'until nc -z mysql-service 3306; do echo waiting for mysql; sleep 2; done;']

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: afes
spec:
  selector:
    app: backend
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
  type: LoadBalancer
