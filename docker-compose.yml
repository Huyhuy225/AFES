services:
  # Trạm 1: Database Local (Dùng thay Azure khi offline)
  db:
    image: mysql:8.0
    container_name: afes-db
    environment:
      MYSQL_DATABASE: afes_db
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: afes-backend
    ports:
      - "8080:8080"
    environment:
      # QUAN TRỌNG: Trỏ vào 'db' (tên service) chứ không phải Azure
      # Sửa lỗi typo 'PRING' thành 'SPRING' luôn nhé Bo
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/afes_db?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=password
    depends_on:
     db:
       condition: service_healthy
  # IF USE AZURE
#  backend:
#    build: ./backend
#    container_name: afes-backend
#    ports:
#      - "8080:8080"
#    environment:
##      # Thay đổi các thông tin bên dưới cho khớp với Azure của bạn
#    - SPRING_DATASOURCE_URL=jdbc:mysql://afes-db.mysql.database.azure.com:3306/afes_db?useSSL=true
#    - SPRING_DATASOURCE_USERNAME=admin123
#    - SPRING_DATASOURCE_PASSWORD=Hello123

  # Trạm 3: Frontend
  frontend:
    build: ./frontend
    container_name: afes-frontend
    ports:
      - "80:80"
    depends_on:
      - backend